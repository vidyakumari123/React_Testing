version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite 8
  - CSS
routes:
  - path: /
    file: src/App.tsx
    auth_required: false
    description: Single-page GitHub User Finder — search field, profile, and repositories
features:
  - name: GitHub user lookup
    description: Search by GitHub username; loads profile and up to six most recently updated public repos
    files:
      - src/App.tsx
      - src/components/SearchBar.tsx
      - src/hooks/useGithubUser.ts
      - src/components/UserCard.tsx
      - src/components/RepoList.tsx
      - src/components/RepoItem.tsx
      - src/components/ErrorMessage.tsx
      - src/components/LoadingState.tsx
    entry_route: /
    user_interactions:
      - View empty state message before any search
      - Enter GitHub username in the username field
      - Submit search via Search button
      - See validation alert when submitting without a username
      - Clear the input with the clear control when text is present
      - Observe loading UI while data loads
      - View user card with avatar, login link, optional name, bio, location, and repo/follower stats
      - View Recent Repositories section with repo cards, stars, and language when applicable
      - View empty repositories message when the user has no public repos
      - View error message when user is not found or API fails
      - Click Try Again to dismiss error and reset to search again
    api_calls:
      - method: GET
        endpoint: https://api.github.com/users/{username}
      - method: GET
        endpoint: https://api.github.com/users/{username}/repos?sort=updated&per_page=6
    auth_required: false
known_limitations:
  - issue: Public GitHub REST API rate limits apply without authentication
    location: src/hooks/useGithubUser.ts
    impact: Repeated live API calls in automated tests may be throttled
